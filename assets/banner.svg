<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" fill="none">
  <defs>
    <linearGradient id="pokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#180e29" />
      <stop offset="50%" stop-color="#2a1240" />
      <stop offset="100%" stop-color="#3b1554" />
    </linearGradient>
    <linearGradient id="goldGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#FBBF24" />
    </linearGradient>
    <pattern id="gridPoke" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#F59E0B" stroke-opacity="0.08" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="1280" height="360" fill="url(#pokeGrad)" />
  <rect width="1280" height="360" fill="url(#gridPoke)" />

  <!-- Poké Emblem Container -->
  <rect x="70" y="65" width="230" height="230" rx="36" fill="#4c1d95" fill-opacity="0.6" stroke="#F59E0B" stroke-opacity="0.4" stroke-width="2" />
  
  <!-- Pokeball Vector Icon -->
  <g transform="translate(105, 100) scale(1.6)">
    <circle cx="12" cy="12" r="10" fill="none" stroke="url(#goldGlow)" stroke-width="2.5"/>
    <line x1="2" y1="12" x2="22" y2="12" stroke="url(#goldGlow)" stroke-width="2.5"/>
    <circle cx="12" cy="12" r="3.5" fill="#180e29" stroke="url(#goldGlow)" stroke-width="2"/>
  </g>

  <!-- Typography -->
  <text x="340" y="110" fill="#FBBF24" font-family="monospace" font-size="16" font-weight="700" letter-spacing="2">UK TCG VAULT &amp; PRICE TRACKER STUDIO</text>
  <text x="336" y="180" fill="#F3F4F6" font-family="sans-serif" font-size="58" font-weight="700" letter-spacing="-1.5">PokeGuru</text>
  <text x="340" y="225" fill="#D8B4FE" font-family="sans-serif" font-size="22">Real-Time UK GBP (£) Card Valuations · Portfolio Analytics</text>

  <!-- Badge -->
  <rect x="340" y="255" width="280" height="42" rx="21" fill="#5b21b6" stroke="#F59E0B" stroke-opacity="0.5" stroke-width="1.5" />
  <circle cx="365" cy="276" r="6" fill="#34D399" />
  <text x="382" y="281" fill="#FDE68A" font-family="monospace" font-size="14" font-weight="700">VERIFIED CARD DATABASE</text>
</svg>
