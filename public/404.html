<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><title>PokeGuru</title>
<script>
  // Redirect deep links to index with an encoded path so BrowserRouter can restore it.
  var seg = 1; // project page: keep /PokeGuru
  var l = window.location;
  l.replace(
    l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
    l.pathname.split('/').slice(0, 1 + seg).join('/') + '/?/' +
    l.pathname.slice(1).split('/').slice(seg).join('/').replace(/&/g, '~and~') +
    (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
    l.hash
  );
</script></head><body></body></html>
